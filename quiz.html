<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz – LogicLab</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>
  <header class="page-header">
    <a href="index.html" class="back-btn">← Home</a>
    <span class="page-title">◈ Quiz Interattivo</span>
  </header>

  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
      <div>
        <div style="font-family:var(--font-display);font-size:.75rem;color:var(--text-dim);letter-spacing:.1em">PUNTEGGIO</div>
        <div id="score-display" style="font-family:var(--font-display);font-size:1.6rem;color:var(--green)">0 / 0</div>
      </div>
      <div>
        <div style="font-family:var(--font-display);font-size:.75rem;color:var(--text-dim);letter-spacing:.1em;margin-bottom:.3rem">DIFFICOLTÀ</div>
        <div style="display:flex;gap:.5rem">
          <button class="btn secondary" onclick="setDiff('easy')" id="d-easy">Facile</button>
          <button class="btn" onclick="setDiff('medium')" id="d-med">Medio</button>
          <button class="btn secondary" onclick="setDiff('hard')" id="d-hard">Difficile</button>
        </div>
      </div>
      <button class="btn secondary" onclick="restart()">↺ Ricomincia</button>
    </div>

    <div style="background:rgba(255,255,255,.05);border-radius:2px;height:4px;margin-bottom:2rem;overflow:hidden">
      <div id="progress-bar" style="height:100%;background:var(--green);width:0%;transition:width .4s;box-shadow:0 0 8px var(--green)"></div>
    </div>

    <div id="quiz-container"></div>
    <div id="result-container" style="display:none"></div>
  </div>

  <script>
    const allQuestions = {
      easy: [
        {
          q: "Qual è l'uscita di una porta <strong>AND</strong> con A=1 e B=0?",
          opts: ["0", "1", "Dipende da C", "Non definita"],
          ans: 0,
          exp: "AND = 1 solo se tutti gli ingressi sono 1. Poiché B=0, F=0."
        },
        {
          q: "Qual è l'uscita di una porta <strong>OR</strong> con A=0 e B=1?",
          opts: ["0", "1", "Indefinita", "Errore"],
          ans: 1,
          exp: "OR = 1 se almeno un ingresso è 1. B=1 → F=1."
        },
        {
          q: "La porta <strong>NOT</strong> con ingresso A=1 restituisce:",
          opts: ["1", "0", "Non definita", "Dipende"],
          ans: 1,
          exp: "NOT inverte: NOT(1) = 0."
        },
        {
          q: "Quante righe ha una tabella di verità con <strong>3 variabili</strong>?",
          opts: ["3", "6", "8", "16"],
          ans: 2,
          exp: "Con n variabili ci sono 2ⁿ righe. 2³ = 8."
        },
        {
          q: "La forma <strong>SOP</strong> sta per:",
          opts: ["Sum Of Products", "Signal Output Port", "Simple OR Path", "Switch On Power"],
          ans: 0,
          exp: "SOP = somma (OR) di prodotti (AND). Es: AB + CD."
        }
      ],
      medium: [
        {
          q: "La porta <strong>XOR</strong> con A=1 e B=1 restituisce:",
          opts: ["0", "1", "2", "Non definita"],
          ans: 0,
          exp: "XOR = 1 solo se gli ingressi sono DIVERSI. 1⊕1 = 0."
        },
        {
          q: "Applicando <strong>De Morgan</strong> a ¬(A+B) si ottiene:",
          opts: ["Ā + B̄", "Ā · B̄", "A · B", "A + B"],
          ans: 1,
          exp: "De Morgan: ¬(A+B) = Ā·B̄. Il NOT si distribuisce e OR diventa AND."
        },
        {
          q: "Nella mappa di Karnaugh, un gruppo di <strong>4 celle</strong> elimina quante variabili?",
          opts: ["1", "2", "3", "4"],
          ans: 1,
          exp: "Un gruppo di 2ⁿ celle elimina n variabili. 2²=4 → elimina 2 variabili."
        },
        {
          q: "Quale proprietà semplifica <strong>AB + AB̄</strong>?",
          opts: ["De Morgan", "Assorbimento", "Complemento (B+B̄=1)", "Idempotenza"],
          ans: 2,
          exp: "AB + AB̄ = A(B+B̄) = A·1 = A. Si usa il complemento."
        },
        {
          q: "La mappa di Karnaugh ordina le celle secondo il codice:",
          opts: ["Binario naturale", "Gray", "BCD", "ASCII"],
          ans: 1,
          exp: "Il codice Gray garantisce che celle adiacenti differiscano di 1 solo bit, fondamentale per i raggruppamenti."
        }
      ],
      hard: [
        {
          q: "Applicando <strong>De Morgan</strong> a ¬(A·B) si ottiene:",
          opts: ["Ā · B̄", "Ā + B̄", "A + B", "A · B"],
          ans: 1,
          exp: "De Morgan: ¬(A·B) = Ā+B̄. Il NOT si distribuisce e AND diventa OR."
        },
        {
          q: "Quale porta logica è considerata <strong>universale</strong> (da sola realizza qualsiasi funzione)?",
          opts: ["AND", "OR", "NAND", "XOR"],
          ans: 2,
          exp: "NAND (e NOR) sono porte universali: con sole NAND si costruisce NOT, AND e OR."
        },
        {
          q: "Il <strong>teorema del consenso</strong> afferma che in AB + ĀC + BC il termine ridondante è:",
          opts: ["AB", "ĀC", "BC", "Nessuno"],
          ans: 2,
          exp: "AB + ĀC + BC = AB + ĀC. Il termine BC (termine di consenso) è ridondante."
        },
        {
          q: "Con <strong>4 variabili</strong> la mappa di Karnaugh ha dimensione:",
          opts: ["2×4", "4×4", "3×4", "2×8"],
          ans: 1,
          exp: "4 variabili = 2⁴ = 16 celle → mappa 4×4."
        },
        {
          q: "La forma <strong>POS</strong> (Product of Sums) si costruisce a partire dai:",
          opts: ["Mintermini (F=1)", "Maxtermini (F=0)", "Entrambi", "Nessuno dei due"],
          ans: 1,
          exp: "POS usa i maxtermini: le combinazioni dove F=0 nella tabella di verità."
        }
      ]
    };

    let diff = 'medium';
    let questions = [];
    let current = 0;
    let score = 0;
    let answered = false;

    function setDiff(d) {
      diff = d;
      document.getElementById('d-easy').className = d==='easy' ? 'btn' : 'btn secondary';
      document.getElementById('d-med').className  = d==='medium' ? 'btn' : 'btn secondary';
      document.getElementById('d-hard').className = d==='hard' ? 'btn' : 'btn secondary';
      restart();
    }

    function restart() {
      current = 0; score = 0; answered = false;
      questions = shuffle([...allQuestions[diff]]);
      document.getElementById('result-container').style.display = 'none';
      document.getElementById('quiz-container').style.display = 'block';
      updateScore();
      renderQuestion();
    }

    function shuffle(arr) {
      for (let i = arr.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]] = [arr[j],arr[i]];
      }
      return arr;
    }

    function updateScore() {
      document.getElementById('score-display').textContent = `${score} / ${current}`;
      const pct = questions.length > 0 ? (current/questions.length)*100 : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    function renderQuestion() {
      if (current >= questions.length) { showResult(); return; }
      const q = questions[current];
      answered = false;
      document.getElementById('quiz-container').innerHTML = `
        <div class="quiz-card">
          <div style="font-family:var(--font-mono);font-size:.75rem;color:var(--text-dim);margin-bottom:.8rem">
            Domanda ${current+1} di ${questions.length}
          </div>
          <div class="quiz-q">${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o,i)=>`
              <button class="quiz-opt" id="opt-${i}" onclick="answer(${i})">
                <span style="color:var(--text-dim);margin-right:.7rem">${String.fromCharCode(65+i)}.</span>${o}
              </button>
            `).join('')}
          </div>
          <div id="feedback" style="display:none" class="quiz-feedback"></div>
        </div>
      `;
    }

    function answer(idx) {
      if (answered) return;
      answered = true;
      const q = questions[current];
      const correct = q.ans === idx;
      if (correct) score++;
      current++;

      document.querySelectorAll('.quiz-opt').forEach((b, i) => {
        b.disabled = true;
        if (i === q.ans) b.classList.add('correct');
        else if (i === idx && !correct) b.classList.add('wrong');
      });

      const fb = document.getElementById('feedback');
      fb.style.display = 'block';
      fb.className = `quiz-feedback ${correct?'ok':'ko'}`;
      fb.innerHTML = `${correct ? '✓ Corretto!' : '✗ Sbagliato!'} — ${q.exp}`;

      updateScore();
      setTimeout(() => renderQuestion(), 2400);
    }

    function showResult() {
      document.getElementById('quiz-container').style.display = 'none';
      document.getElementById('progress-bar').style.width = '100%';
      const pct = Math.round((score / questions.length) * 100);
      const msg = pct === 100 ? '🏆 Perfetto!' : pct >= 80 ? 'Ottimo lavoro!' : pct >= 60 ? 'Non male, riprova!' : 'Studia ancora un po\'!';
      const col = pct >= 60 ? 'var(--green)' : pct >= 40 ? 'var(--orange)' : 'var(--red)';

      document.getElementById('result-container').style.display = 'block';
      document.getElementById('result-container').innerHTML = `
        <div class="quiz-card" style="text-align:center;border-color:${col}">
          <div style="font-family:var(--font-display);font-size:3rem;color:${col};margin-bottom:.5rem">${score}/${questions.length}</div>
          <div style="font-size:1.1rem;color:#fff;margin-bottom:.4rem">${msg}</div>
          <div style="color:var(--text-dim);margin-bottom:1.5rem">${pct}% corretto · ${diff}</div>
          <button class="btn" onclick="restart()">↺ Rigioca</button>
          <a href="index.html" class="btn secondary" style="margin-left:.8rem;display:inline-block;text-decoration:none">← Home</a>
        </div>
      `;
    }

    window.onload = () => setDiff('medium');
  </script>
</body>
</html>
