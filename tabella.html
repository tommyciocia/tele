<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabella di Verità – LogicLab</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <header class="page-header">
    <a href="index.html" class="back-btn">← Home</a>
    <span class="page-title">▦ Tabella di Verità</span>
  </header>

  <div class="section">
    <div class="info-box">
      <strong>Come funziona:</strong> Scegli il numero di variabili, poi clicca le celle della colonna <strong style="color:var(--orange)">F</strong> per metterle a 1 o 0.
    </div>

    <div class="input-group">
      <label style="color:var(--text-dim);font-size:.85rem;">Variabili:</label>
      <select id="nvars" onchange="onVarsChange()">
        <option value="2">2 (A, B)</option>
        <option value="3" selected>3 (A, B, C)</option>
        <option value="4">4 (A, B, C, D)</option>
      </select>
      <button class="btn secondary" onclick="resetF()">Azzera F</button>
      <button class="btn secondary" onclick="setAllF(1)">Tutti 1</button>
    </div>

    <div id="table-container"></div>

    <div id="formula-section" style="margin-top:2rem">
      <h2>Formula canonica SOP</h2>
      <div class="formula" id="formula-out">–</div>
      <p style="color:var(--text-dim);font-size:.82rem;margin-top:.5rem">
        La formula viene aggiornata automaticamente ad ogni click su F.
      </p>
    </div>
  </div>

  <script>
    const varSets = { 2:['A','B'], 3:['A','B','C'], 4:['A','B','C','D'] };
    let fValues = [];

    function getBit(num, pos, total) {
      return (num >> (total - 1 - pos)) & 1;
    }

    function onVarsChange() {
      const n = parseInt(document.getElementById('nvars').value);
      fValues = new Array(Math.pow(2, n)).fill(0);
      buildTable();
    }

    function buildTable() {
      const n = parseInt(document.getElementById('nvars').value);
      const vars = varSets[n];
      const rows = Math.pow(2, n);

      let html = `<table class="truth-table"><thead><tr>
        ${vars.map(v => `<th>${v}</th>`).join('')}
        <th style="color:var(--orange)">F</th>
      </tr></thead><tbody>`;

      for (let i = 0; i < rows; i++) {
        const bits = vars.map((v, pos) => getBit(i, pos, n));
        const f = fValues[i];
        html += `<tr>
          ${bits.map(b => `<td class="${b===1?'one':'zero'}">${b}</td>`).join('')}
          <td class="${f===1?'one':'zero'}"
              style="cursor:pointer;font-size:1.1rem;border:1px solid ${f?'rgba(0,255,157,.35)':'rgba(255,107,53,.2)'}"
              onclick="toggleF(${i})">${f}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('table-container').innerHTML = html;
      updateFormula();
    }

    function toggleF(idx) {
      fValues[idx] ^= 1;
      buildTable();
    }

    function resetF() {
      const n = parseInt(document.getElementById('nvars').value);
      fValues = new Array(Math.pow(2, n)).fill(0);
      buildTable();
    }

    function setAllF(v) {
      const n = parseInt(document.getElementById('nvars').value);
      fValues = new Array(Math.pow(2, n)).fill(v);
      buildTable();
    }

    function updateFormula() {
      const n = parseInt(document.getElementById('nvars').value);
      const vars = varSets[n];
      const minterms = fValues.map((v,i) => v ? i : null).filter(x => x !== null);

      if (minterms.length === 0) {
        document.getElementById('formula-out').textContent = 'F = 0';
        return;
      }
      if (minterms.length === Math.pow(2, n)) {
        document.getElementById('formula-out').textContent = 'F = 1';
        return;
      }

      const terms = minterms.map(m => {
        return vars.map((v, pos) => {
          const bit = getBit(m, pos, n);
          return bit === 1 ? v : v + '̄';
        }).join('·');
      });

      document.getElementById('formula-out').textContent = `F = ${terms.join(' + ')}`;
    }

    window.onload = () => {
      fValues = [0,1,0,1,0,1,0,1];
      buildTable();
    };
  </script>
</body>
</html>
