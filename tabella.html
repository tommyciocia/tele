<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabella di Verità – LogicLab</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <header class="page-header">
    <a href="index.html" class="back-btn">← Home</a>
    <span class="page-title">▦ Tabella di Verità</span>
  </header>

  <div class="section">
    <div class="info-box">
      <strong>Come funziona:</strong> Scegli il numero di variabili, inserisci i numeri dei mintermini (es. <code>1,3,5,7</code>) e premi Genera. La tabella mostrerà tutti i casi con l'uscita F.
    </div>

    <div class="input-group">
      <label style="color:var(--text-dim);font-size:.85rem;">Variabili:</label>
      <select id="nvars">
        <option value="2">2 (A,B)</option>
        <option value="3" selected>3 (A,B,C)</option>
        <option value="4">4 (A,B,C,D)</option>
      </select>
      <label style="color:var(--text-dim);font-size:.85rem;">Mintermini Σm(</label>
      <input type="text" id="mintermini" value="1,3,5,7" placeholder="es. 0,2,4" style="width:180px">
      <label style="color:var(--text-dim);font-size:.85rem;">)</label>
      <button class="btn" onclick="genera()">Genera</button>
      <button class="btn secondary" onclick="esempio()">Esempio</button>
    </div>

    <div class="formula" id="formula-out" style="display:none"></div>

    <div id="table-container"></div>

    <div id="sop-out" style="display:none">
      <h2 style="margin-top:2rem">Forma Canonica SOP ricavata</h2>
      <div class="formula" id="sop-formula"></div>
      <p style="color:var(--text-dim);font-size:.85rem">SOP = Sum Of Products (somma di mintermini)</p>
    </div>
  </div>

  <script>
    const varNames = { 2: ['A','B'], 3: ['A','B','C'], 4: ['A','B','C','D'] };

    function getBit(num, pos, total) {
      return (num >> (total - 1 - pos)) & 1;
    }

    function genera() {
      const n = parseInt(document.getElementById('nvars').value);
      const vars = varNames[n];
      const rawInput = document.getElementById('mintermini').value;
      const rows = Math.pow(2, n);

      const mintSet = new Set(
        rawInput.split(',').map(s => parseInt(s.trim())).filter(x => !isNaN(x) && x >= 0 && x < rows)
      );

      // Formula display
      const fOut = document.getElementById('formula-out');
      fOut.style.display = 'block';
      fOut.textContent = `F = Σm(${[...mintSet].sort((a,b)=>a-b).join(', ')})`;

      // Build table
      let html = `<table class="truth-table"><thead><tr>
        <th>#</th>${vars.map(v=>`<th>${v}</th>`).join('')}<th>F</th><th>Minterm</th>
      </tr></thead><tbody>`;

      const sopTerms = [];
      for (let i = 0; i < rows; i++) {
        const bits = vars.map((v, pos) => getBit(i, pos, n));
        const isOne = mintSet.has(i);
        const mintStr = vars.map((v, pos) => bits[pos] === 0 ? `${v}̄` : v).join('·');
        if (isOne) sopTerms.push(mintStr);
        html += `<tr>
          <td class="minterm">${i}</td>
          ${bits.map(b => `<td class="${b===1?'one':'zero'}">${b}</td>`).join('')}
          <td class="${isOne?'one':'zero'}">${isOne?1:0}</td>
          <td style="color:var(--text-dim);font-size:.8rem">${isOne ? mintStr : '–'}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('table-container').innerHTML = html;

      // SOP
      const sopEl = document.getElementById('sop-out');
      sopEl.style.display = 'block';
      document.getElementById('sop-formula').textContent =
        sopTerms.length > 0 ? `F = ${sopTerms.join(' + ')}` : 'F = 0 (nessun minterm)';
    }

    function esempio() {
      document.getElementById('nvars').value = '3';
      document.getElementById('mintermini').value = '1,3,5,7';
      genera();
    }

    // Auto-genera all'avvio
    window.onload = () => genera();
  </script>
</body>
</html>
