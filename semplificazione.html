<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semplificazione – LogicLab</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <header class="page-header">
    <a href="index.html" class="back-btn">← Home</a>
    <span class="page-title">∑ Semplificazione</span>
  </header>

  <div class="section">
    <div class="info-box">
      <strong>Percorso passo-passo:</strong> Dalla forma canonica SOP all'espressione minima tramite proprietà booleane e raggruppamenti. Inserisci i mintermini e segui i passaggi.
    </div>

    <div class="input-group">
      <label style="color:var(--text-dim);font-size:.85rem;">Variabili:</label>
      <select id="nvars">
        <option value="2">2 (A,B)</option>
        <option value="3" selected>3 (A,B,C)</option>
        <option value="4">4 (A,B,C,D)</option>
      </select>
      <label style="color:var(--text-dim);font-size:.85rem;">Mintermini Σm(</label>
      <input type="text" id="mint-in" value="1,3,5,7" style="width:160px">
      <label style="color:var(--text-dim);font-size:.85rem;">)</label>
      <button class="btn" onclick="semplifica()">Semplifica</button>
      <button class="btn secondary" onclick="setEsempio(1)">Es. 1</button>
      <button class="btn secondary" onclick="setEsempio(2)">Es. 2</button>
    </div>

    <div id="steps-container"></div>
  </div>

  <script>
    const varSets = {
      2: ['A','B'],
      3: ['A','B','C'],
      4: ['A','B','C','D']
    };

    function getBit(num, bit, total) {
      return (num >> (total - 1 - bit)) & 1;
    }

    function mintermsToTerm(group, vars) {
      const n = vars.length;
      const term = [];
      for (let i = 0; i < n; i++) {
        const vals = group.map(m => getBit(m, i, n));
        if (vals.every(v => v === 1)) term.push(vars[i]);
        else if (vals.every(v => v === 0)) term.push(vars[i] + '̄');
      }
      return term.join('·') || '1';
    }

    function differ1bit(a, b) {
      const xor = a ^ b;
      return xor > 0 && (xor & (xor - 1)) === 0;
    }

    function semplifica() {
      const n = parseInt(document.getElementById('nvars').value);
      const vars = varSets[n];
      const max = Math.pow(2, n);
      const rawInput = document.getElementById('mint-in').value;
      const mints = [...new Set(rawInput.split(',').map(s => parseInt(s.trim())).filter(x => !isNaN(x) && x >= 0 && x < max))].sort((a,b)=>a-b);

      if (mints.length === 0) {
        document.getElementById('steps-container').innerHTML = '<p style="color:var(--red)">Nessun minterm valido inserito.</p>';
        return;
      }

      const steps = [];

      // Step 1: Forma canonica SOP
      const canonFull = mints.map(m => {
        const term = vars.map((v, i) => getBit(m, i, n) === 1 ? v : `${v}̄`).join('·');
        return `m${m}(${term})`;
      });
      steps.push({
        title: 'STEP 1 – Forma Canonica SOP',
        content: `F = ${canonFull.join(' + ')}`,
        note: 'Ogni minterm = prodotto di tutte le variabili (complementate o no)'
      });

      // Step 2: Forma canonica compatta
      steps.push({
        title: 'STEP 2 – Notazione compatta',
        content: `F = Σm(${mints.join(', ')})`,
        note: `Numero totale mintermini: ${mints.length} su ${max} possibili`
      });

      // Step 3: Raggruppa coppie (Quine-McCluskey base)
      const pairs = [];
      for (let i = 0; i < mints.length; i++) {
        for (let j = i + 1; j < mints.length; j++) {
          if (differ1bit(mints[i], mints[j])) {
            pairs.push([mints[i], mints[j]]);
          }
        }
      }

      if (pairs.length > 0) {
        const pairStr = pairs.map(p => `(${p.join(',')})`).join(' | ');
        steps.push({
          title: 'STEP 3 – Coppie adiacenti (differiscono di 1 bit)',
          content: pairStr,
          note: 'Due mintermini adiacenti possono essere combinati: es. ABC̄ + ABC = AB'
        });

        // Step 4: Termini semplificati dalle coppie
        const pairTerms = pairs.map(p => ({ group: p, term: mintermsToTerm(p, vars) }));
        const uniqueTerms = [...new Map(pairTerms.map(t => [t.term, t])).values()];
        const simplified = uniqueTerms.map(t => t.term);

        // Aggiungi mintermini non coperti da coppie
        const coveredByPairs = new Set(pairs.flat());
        const uncovered = mints.filter(m => !coveredByPairs.has(m));
        const uncovTerms = uncovered.map(m => mintermsToTerm([m], vars));

        const allTerms = [...simplified, ...uncovTerms];
        const finalUnique = [...new Set(allTerms)];

        steps.push({
          title: 'STEP 4 – Espressione dopo combinazione coppie',
          content: `F = ${finalUnique.join(' + ')}`,
          note: `Riduzione da ${mints.length} termini → ${finalUnique.length} termini`
        });

        // Step 5: Cerca quartetti
        const quads = [];
        for (let i = 0; i < pairs.length; i++) {
          for (let j = i + 1; j < pairs.length; j++) {
            const combined = [...new Set([...pairs[i], ...pairs[j]])];
            if (combined.length === 4) {
              const allAdj = combined.every(a => combined.some(b => b !== a && differ1bit(a, b)));
              if (allAdj) quads.push(combined);
            }
          }
        }

        let finalTerms = finalUnique;
        if (quads.length > 0) {
          const quadTerms = quads.map(q => mintermsToTerm(q, vars));
          finalTerms = [...new Set(quadTerms)];
          steps.push({
            title: 'STEP 5 – Gruppi da 4 (quartetti)',
            content: quads.map(q => `(${q.join(',')})`).join(' | '),
            note: 'Un quartetto elimina 2 variabili'
          });
          steps.push({
            title: '✅ FORMA MINIMA',
            content: `F = ${finalTerms.join(' + ')}`,
            note: `Risparmio: ${mints.length} termini → ${finalTerms.length} termini`,
            highlight: true
          });
        } else {
          steps.push({
            title: '✅ FORMA MINIMA',
            content: `F = ${finalUnique.join(' + ')}`,
            note: `Risparmio: da ${mints.length} a ${finalUnique.length} prodotti`,
            highlight: true
          });
        }
      } else {
        steps.push({
          title: 'STEP 3 – Nessuna coppia adiacente trovata',
          content: 'I mintermini non sono adiacenti nella mappa K',
          note: 'Nessuna ulteriore semplificazione possibile'
        });
        steps.push({
          title: '✅ FORMA MINIMA (già minimale)',
          content: `F = ${mints.map(m => mintermsToTerm([m], vars)).join(' + ')}`,
          highlight: true
        });
      }

      renderSteps(steps);
    }

    function renderSteps(steps) {
      const container = document.getElementById('steps-container');
      container.innerHTML = steps.map((s, i) => `
        <div class="quiz-card" style="${s.highlight ? 'border-color:var(--green);background:rgba(0,255,157,.06)' : ''}">
          <div style="font-family:var(--font-display);font-size:.75rem;color:${s.highlight?'var(--green)':'var(--text-dim)'};letter-spacing:.1em;margin-bottom:.6rem">${s.title}</div>
          <div class="formula" style="${s.highlight?'font-size:1.1rem':''}">${s.content}</div>
          ${s.note ? `<p style="font-size:.8rem;color:var(--text-dim);margin:0">${s.note}</p>` : ''}
        </div>
      `).join('');
    }

    function setEsempio(n) {
      if (n === 1) {
        document.getElementById('nvars').value = '3';
        document.getElementById('mint-in').value = '1,3,5,7';
      } else {
        document.getElementById('nvars').value = '4';
        document.getElementById('mint-in').value = '0,2,4,6,8,10,12,14';
      }
      semplifica();
    }

    window.onload = () => semplifica();
  </script>
</body>
</html>
